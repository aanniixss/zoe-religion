<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Deen · Zoé</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Jost:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #fdf6f8;
  --bg2:      #faeef3;
  --bg3:      #f5e4ec;
  --card:     #ffffff;
  --card2:    #fdf0f5;
  --border:   #f0dae6;
  --border2:  #e8c8d8;

  --rose:     #d4517a;
  --rose2:    #e8789a;
  --rose3:    #f4a0bb;
  --rose-dim: rgba(212,81,122,0.08);
  --rose-mid: rgba(212,81,122,0.15);

  --blush:    #f9e8f0;
  --petal:    #fce4ee;
  --mauve:    #b04070;
  --dusty:    #c98aaa;

  --text:     #2d1a24;
  --text2:    #7a4d62;
  --text3:    #c4a0b4;
  --text4:    #e8d0dc;

  --green:    #5aaa82;
  --green-dim:rgba(90,170,130,0.10);
  --green-brd:rgba(90,170,130,0.35);
  --amber:    #c8883a;
  --amber-dim:rgba(200,136,58,0.10);
  --amber-brd:rgba(200,136,58,0.35);
  --red:      #c84a6a;
  --red-dim:  rgba(200,74,106,0.08);
  --red-brd:  rgba(200,74,106,0.35);
  --lilac:    #9b72cf;
  --lilac-dim:rgba(155,114,207,0.10);
  --lilac-brd:rgba(155,114,207,0.35);

  --radius:   20px;
  --radius-sm:12px;
  --shadow-sm: 0 2px 12px rgba(180,80,120,0.08);
  --shadow:    0 4px 24px rgba(180,80,120,0.12);
  --shadow-lg: 0 8px 40px rgba(180,80,120,0.16);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Jost', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ─────────────────────────────── */
.app-header {
  background: rgba(253,246,248,0.92);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  padding: 18px 20px 0;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.brand-icon {
  width: 38px;
  height: 38px;
  background: linear-gradient(135deg, var(--rose2), var(--rose3));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  box-shadow: 0 3px 12px rgba(212,81,122,0.25);
}

.app-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.2px;
}

.app-subtitle {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 1.8px;
  text-transform: uppercase;
  font-weight: 500;
  margin-top: 1px;
}

.year-selector {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 40px;
  padding: 6px 10px;
  box-shadow: var(--shadow-sm);
}

.year-btn {
  background: none;
  border: none;
  color: var(--rose);
  font-size: 15px;
  cursor: pointer;
  padding: 0 3px;
  line-height: 1;
  font-weight: 600;
}

.year-display {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--mauve);
  font-weight: 500;
  min-width: 34px;
  text-align: center;
}

/* ── NAV ─────────────────────────────────── */
.nav-tabs {
  display: flex;
  gap: 0;
}

.nav-tab {
  flex: 1;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text3);
  font-family: 'Jost', sans-serif;
  font-size: 13px;
  font-weight: 500;
  padding: 11px 4px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}

.nav-tab.active {
  color: var(--rose);
  border-bottom-color: var(--rose);
}

/* ── VIEWS ───────────────────────────────── */
.view { display: none; padding: 20px 16px 100px; }
.view.active { display: block; }

/* ── CARDS ───────────────────────────────── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-sm);
}

.section-label {
  font-size: 10px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--rose);
  font-weight: 600;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--border2), transparent);
}

/* ── DATE ROW ────────────────────────────── */
.date-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 18px;
}

.date-input {
  flex: 1;
  background: var(--card);
  border: 1.5px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  padding: 12px 14px;
  outline: none;
  box-shadow: var(--shadow-sm);
}

.date-input:focus { border-color: var(--rose2); box-shadow: 0 0 0 3px var(--rose-dim); }

.today-btn {
  background: var(--rose);
  border: none;
  border-radius: var(--radius-sm);
  color: white;
  font-size: 12px;
  font-weight: 600;
  padding: 12px 16px;
  cursor: pointer;
  white-space: nowrap;
  font-family: 'Jost', sans-serif;
  letter-spacing: 0.5px;
  box-shadow: 0 3px 12px rgba(212,81,122,0.3);
}

/* ── SCORE CARD ──────────────────────────── */
.score-card {
  background: linear-gradient(145deg, #fff5f8 0%, #fce8f1 50%, #fff0f6 100%);
  border: 1.5px solid var(--border2);
  border-radius: var(--radius);
  padding: 26px 22px 22px;
  margin-bottom: 16px;
  text-align: center;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow);
}

.score-card::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 180px; height: 180px;
  background: radial-gradient(circle, rgba(212,81,122,0.06) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

.score-card::after {
  content: '🌸';
  position: absolute;
  top: 14px; left: 16px;
  font-size: 22px;
  opacity: 0.18;
  pointer-events: none;
}

.score-big {
  font-family: 'Cormorant Garamond', serif;
  font-size: 72px;
  font-weight: 700;
  color: var(--rose);
  line-height: 1;
  letter-spacing: -3px;
}

.score-max {
  font-size: 24px;
  color: var(--text3);
  font-weight: 400;
  letter-spacing: 0;
}

.score-label {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text2);
  margin-top: 5px;
  font-weight: 500;
}

.score-level {
  display: inline-block;
  margin-top: 12px;
  padding: 6px 20px;
  border-radius: 40px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
  font-family: 'Jost', sans-serif;
}

.level-0 { background: var(--red-dim); color: var(--red); border: 1.5px solid var(--red-brd); }
.level-1 { background: var(--amber-dim); color: var(--amber); border: 1.5px solid var(--amber-brd); }
.level-2 { background: var(--rose-dim); color: var(--rose); border: 1.5px solid rgba(212,81,122,0.3); }
.level-3 { background: var(--green-dim); color: var(--green); border: 1.5px solid var(--green-brd); }

.progress-bar-wrap {
  background: var(--bg3);
  border-radius: 6px;
  height: 6px;
  margin-top: 16px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  border-radius: 6px;
  background: linear-gradient(90deg, var(--mauve), var(--rose2), var(--rose3));
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
}

.score-mini {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 8px;
  margin-top: 14px;
}

.score-mini-item {
  background: rgba(255,255,255,0.7);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 6px;
  text-align: center;
}

.score-mini-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  color: var(--rose);
  font-weight: 700;
  line-height: 1;
}

.score-mini-lbl {
  font-size: 9px;
  color: var(--text3);
  margin-top: 3px;
  letter-spacing: 0.5px;
  font-weight: 500;
}

/* ── PRAYERS ─────────────────────────────── */
.prayer-grid { display: flex; flex-direction: column; gap: 14px; }

.prayer-row { display: flex; flex-direction: column; gap: 7px; }

.prayer-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  font-weight: 600;
  font-style: italic;
  color: var(--text);
  letter-spacing: 0.3px;
}

.prayer-options { display: flex; gap: 6px; }

.prayer-btn {
  flex: 1;
  padding: 9px 4px;
  border-radius: 10px;
  border: 1.5px solid var(--border2);
  background: var(--bg2);
  color: var(--text2);
  font-size: 10.5px;
  font-weight: 500;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  font-family: 'Jost', sans-serif;
  letter-spacing: 0.2px;
}

.prayer-btn.selected-mosque {
  background: var(--green-dim);
  border-color: var(--green-brd);
  color: var(--green);
  box-shadow: 0 2px 8px rgba(90,170,130,0.15);
}

.prayer-btn.selected-home {
  background: var(--rose-dim);
  border-color: rgba(212,81,122,0.3);
  color: var(--rose);
  box-shadow: 0 2px 8px rgba(212,81,122,0.12);
}

.prayer-btn.selected-late {
  background: var(--amber-dim);
  border-color: var(--amber-brd);
  color: var(--amber);
}

.prayer-btn.selected-none {
  background: var(--red-dim);
  border-color: var(--red-brd);
  color: var(--red);
}

.rawatib-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5px 0 0;
  border-top: 1px dashed var(--border2);
}

.rawatib-label {
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.3px;
}

.toggle-btn {
  width: 42px;
  height: 23px;
  border-radius: 12px;
  border: 1.5px solid var(--border2);
  background: var(--bg3);
  cursor: pointer;
  position: relative;
  transition: all 0.25s;
  flex-shrink: 0;
}

.toggle-btn::after {
  content: '';
  position: absolute;
  width: 15px;
  height: 15px;
  border-radius: 50%;
  background: var(--text3);
  top: 2px; left: 2px;
  transition: all 0.25s;
}

.toggle-btn.on {
  background: var(--rose-mid);
  border-color: var(--rose2);
}

.toggle-btn.on::after {
  background: var(--rose);
  left: 21px;
}

/* ── HABITS ──────────────────────────────── */
.habit-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}

.habit-row:last-child { border-bottom: none; }

.habit-left { flex: 1; min-width: 0; }
.habit-name { font-size: 13px; color: var(--text); font-weight: 400; }
.habit-sub { font-size: 10px; color: var(--text3); margin-top: 2px; }

.counter-row { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

.counter-btn {
  width: 32px; height: 32px;
  border-radius: 10px;
  border: 1.5px solid var(--border2);
  background: var(--bg2);
  color: var(--text2);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  font-family: 'Jost', sans-serif;
}

.counter-btn:active {
  background: var(--rose-dim);
  border-color: var(--rose2);
  color: var(--rose);
}

.counter-val {
  font-family: 'DM Mono', monospace;
  font-size: 15px;
  color: var(--rose);
  min-width: 28px;
  text-align: center;
  font-weight: 500;
}

.notes-input {
  width: 100%;
  background: var(--bg2);
  border: 1.5px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'Jost', sans-serif;
  font-size: 13px;
  padding: 12px 14px;
  outline: none;
  resize: vertical;
  min-height: 80px;
  margin-top: 8px;
}

.notes-input:focus { border-color: var(--rose2); box-shadow: 0 0 0 3px var(--rose-dim); }

/* ── SAVE BTN ────────────────────────────── */
.save-btn {
  width: 100%;
  background: linear-gradient(135deg, var(--mauve) 0%, var(--rose) 50%, var(--rose2) 100%);
  border: none;
  border-radius: var(--radius);
  color: white;
  font-family: 'Jost', sans-serif;
  font-size: 15px;
  font-weight: 600;
  padding: 16px;
  cursor: pointer;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-top: 8px;
  box-shadow: 0 6px 24px rgba(212,81,122,0.3);
  transition: all 0.2s;
}

.save-btn:active { transform: scale(0.98); box-shadow: 0 3px 12px rgba(212,81,122,0.2); }

/* ── STAT GRIDS ──────────────────────────── */
.stat-grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}

.stat-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px 14px;
  text-align: center;
  box-shadow: var(--shadow-sm);
}

.stat-box-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 700;
  color: var(--rose);
  line-height: 1;
}

.stat-box-label {
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-top: 5px;
  font-weight: 600;
}

.stat-box.highlight {
  background: linear-gradient(135deg, #fff0f4, #fce8f1);
  border-color: rgba(212,81,122,0.2);
}

/* ── WEEK CARDS ──────────────────────────── */
.week-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: var(--shadow-sm);
}

.week-card:active { border-color: var(--rose2); box-shadow: var(--shadow); transform: scale(0.99); }

.week-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.week-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  color: var(--text);
  font-weight: 600;
}

.week-dates {
  font-size: 11px;
  color: var(--text3);
  font-family: 'DM Mono', monospace;
  margin-top: 2px;
}

.week-score-badge {
  background: linear-gradient(135deg, #fff0f4, #fce8f1);
  border: 1.5px solid rgba(212,81,122,0.2);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 13px;
  font-weight: 600;
  color: var(--rose);
  font-family: 'DM Mono', monospace;
}

.week-dots { display: flex; gap: 5px; align-items: center; }

.week-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--border2);
}

.week-dot.filled { background: var(--rose2); box-shadow: 0 0 5px rgba(232,120,154,0.4); }
.week-dot.partial { background: var(--rose3); }

/* ── BARS ────────────────────────────────── */
.bar-row { margin-bottom: 12px; }

.bar-label-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 5px;
}

.bar-label { font-size: 12px; color: var(--text2); }
.bar-num { font-size: 12px; color: var(--rose); font-family: 'DM Mono', monospace; font-weight: 500; }

.bar-track {
  background: var(--bg3);
  border-radius: 6px;
  height: 5px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  border-radius: 6px;
  background: linear-gradient(90deg, var(--mauve), var(--rose2));
}

.bar-fill.green { background: linear-gradient(90deg, #3d9e6a, var(--green)); }
.bar-fill.lilac { background: linear-gradient(90deg, #7a50b0, var(--lilac)); }

/* ── MONTH CAL ───────────────────────────── */
.month-selector {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.month-nav-btn {
  background: var(--card);
  border: 1.5px solid var(--border2);
  border-radius: 10px;
  color: var(--rose);
  font-size: 18px;
  width: 38px; height: 38px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-sm);
}

.month-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  color: var(--text);
  font-weight: 600;
  font-style: italic;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}

.cal-header {
  text-align: center;
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.5px;
  padding: 4px 0 6px;
  font-weight: 600;
}

.cal-day {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 5px 2px;
  text-align: center;
  cursor: pointer;
  min-height: 46px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  transition: all 0.15s;
}

.cal-day:active { border-color: var(--rose2); background: var(--petal); }

.cal-day-num {
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  line-height: 1;
}

.cal-day-score {
  font-size: 9px;
  font-family: 'DM Mono', monospace;
  margin-top: 3px;
  border-radius: 4px;
  padding: 1px 3px;
  font-weight: 600;
}

.cal-day.empty { background: transparent; border-color: transparent; cursor: default; }
.cal-day.today { border-color: var(--rose); background: var(--petal); box-shadow: 0 0 0 2px rgba(212,81,122,0.12); }

.score-color-0 { background: transparent; color: var(--text4); }
.score-color-1 { background: rgba(200,74,106,0.10); color: var(--red); }
.score-color-2 { background: rgba(200,136,58,0.10); color: var(--amber); }
.score-color-3 { background: rgba(212,81,122,0.10); color: var(--rose); }
.score-color-4 { background: rgba(90,170,130,0.12); color: var(--green); }

/* ── HEATMAP ─────────────────────────────── */
.heatmap-wrap { overflow-x: auto; padding-bottom: 6px; }

.heatmap-grid {
  display: grid;
  grid-template-columns: repeat(53, 1fr);
  gap: 2px;
  min-width: 500px;
}

.heatmap-cell {
  width: 100%;
  aspect-ratio: 1;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.15s;
}

.heatmap-cell:hover { opacity: 0.7; transform: scale(1.3); }
.heatmap-cell.h0 { background: var(--bg3); }
.heatmap-cell.h1 { background: rgba(212,81,122,0.18); }
.heatmap-cell.h2 { background: rgba(212,81,122,0.36); }
.heatmap-cell.h3 { background: rgba(212,81,122,0.58); }
.heatmap-cell.h4 { background: var(--rose2); box-shadow: 0 0 3px rgba(232,120,154,0.5); }

/* ── MONTH BARS ──────────────────────────── */
.month-bars {
  display: flex;
  align-items: flex-end;
  gap: 4px;
  height: 70px;
}

.month-bar-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  height: 100%;
}

.month-bar {
  width: 100%;
  border-radius: 4px 4px 0 0;
  background: linear-gradient(180deg, var(--rose3), var(--rose));
  min-height: 2px;
  transition: height 0.4s ease;
}

/* ── CHIPS ───────────────────────────────── */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 11px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  font-family: 'Jost', sans-serif;
}

.chip-green  { background: var(--green-dim);  color: var(--green);  border: 1px solid var(--green-brd); }
.chip-rose   { background: var(--rose-dim);   color: var(--rose);   border: 1px solid rgba(212,81,122,0.25); }
.chip-amber  { background: var(--amber-dim);  color: var(--amber);  border: 1px solid var(--amber-brd); }
.chip-lilac  { background: var(--lilac-dim);  color: var(--lilac);  border: 1px solid var(--lilac-brd); }
.chip-red    { background: var(--red-dim);    color: var(--red);    border: 1px solid var(--red-brd); }

/* ── TOAST ───────────────────────────────── */
.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%) translateY(120px);
  background: var(--rose);
  color: white;
  padding: 11px 26px;
  border-radius: 40px;
  font-size: 13px;
  font-weight: 600;
  z-index: 300;
  transition: transform 0.3s cubic-bezier(.4,0,.2,1);
  white-space: nowrap;
  box-shadow: 0 6px 24px rgba(212,81,122,0.35);
  letter-spacing: 0.3px;
}

.toast.show { transform: translateX(-50%) translateY(0); }

/* ── UTILS ───────────────────────────────── */
.btn-sm {
  background: var(--card);
  border: 1.5px solid var(--border2);
  border-radius: 10px;
  color: var(--text2);
  font-size: 12px;
  font-weight: 500;
  padding: 8px 14px;
  cursor: pointer;
  font-family: 'Jost', sans-serif;
  box-shadow: var(--shadow-sm);
}

.btn-danger {
  background: var(--red-dim);
  border-color: var(--red-brd);
  color: var(--red);
}

.flex-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }

.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: none;
  color: var(--rose);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  margin-bottom: 16px;
  font-family: 'Jost', sans-serif;
  padding: 0;
}

.detail-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}

.detail-row:last-child { border-bottom: none; }
.detail-label { font-size: 13px; color: var(--text2); }
.detail-val { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--rose); font-weight: 500; }

hr.divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

/* decorative petal bg */
.petal-bg {
  position: fixed;
  bottom: -40px; right: -40px;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(244,160,187,0.08) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
}
</style>
</head>
<body>

<div class="petal-bg"></div>

<!-- ═══════════════════════ HEADER ════════════════════ -->
<div class="app-header">
  <div class="header-top">
    <div class="brand">
      <div class="brand-icon">🌸</div>
      <div>
        <div class="app-title">Deen · Zoé</div>
        <div class="app-subtitle">Tracker religieux personnel</div>
      </div>
    </div>
    <div class="year-selector">
      <button class="year-btn" onclick="changeYear(-1)">‹</button>
      <div class="year-display" id="yearDisplay">2026</div>
      <button class="year-btn" onclick="changeYear(1)">›</button>
    </div>
  </div>
  <nav class="nav-tabs">
    <button class="nav-tab active" onclick="showView('jour',event)">Jour</button>
    <button class="nav-tab" onclick="showView('semaine',event)">Semaine</button>
    <button class="nav-tab" onclick="showView('mois',event)">Mois</button>
    <button class="nav-tab" onclick="showView('annee',event)">Année</button>
  </nav>
</div>

<!-- ═══════════════════════ VUE JOUR ══════════════════ -->
<div class="view active" id="view-jour">

  <div class="date-row">
    <input type="date" class="date-input" id="dayDateInput" onchange="loadDay()">
    <button class="today-btn" onclick="goToday()">Aujourd'hui</button>
  </div>

  <div class="score-card">
    <div class="score-big" id="dayScore">0<span class="score-max">/100</span></div>
    <div class="score-label">Score du jour</div>
    <div class="score-level level-0" id="dayLevel">À améliorer 🌱</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="dayProgressBar" style="width:0%"></div>
    </div>
    <div class="score-mini">
      <div class="score-mini-item">
        <div class="score-mini-num" id="miniPrayers">0/5</div>
        <div class="score-mini-lbl">Prières</div>
      </div>
      <div class="score-mini-item">
        <div class="score-mini-num" id="miniQuran">0</div>
        <div class="score-mini-lbl">Pages Coran</div>
      </div>
      <div class="score-mini-item">
        <div class="score-mini-num" id="miniHabits">0</div>
        <div class="score-mini-lbl">Habitudes</div>
      </div>
    </div>
  </div>

  <div class="section-label">Prières</div>
  <div class="card">
    <div class="prayer-grid" id="prayerGrid"></div>
  </div>

  <div class="section-label">Habitudes Religieuses</div>
  <div class="card">
    <div id="habitsGrid"></div>
  </div>

  <div class="section-label">Notes du Jour</div>
  <div class="card">
    <textarea class="notes-input" id="dayNotes" placeholder="Réflexions, intentions, gratitudes..."></textarea>
  </div>

  <button class="save-btn" onclick="saveDay()">Enregistrer la journée</button>
</div>

<!-- ═══════════════════════ VUE SEMAINE ═══════════════ -->
<div class="view" id="view-semaine">
  <div id="weekListView">
    <div class="section-label">Semaines <span id="weekYearLabel"></span></div>
    <div id="weekList"></div>
  </div>
  <div id="weekDetailView" style="display:none">
    <button class="back-btn" onclick="showWeekList()">← Toutes les semaines</button>
    <div id="weekDetailContent"></div>
  </div>
</div>

<!-- ═══════════════════════ VUE MOIS ══════════════════ -->
<div class="view" id="view-mois">
  <div class="month-selector">
    <button class="month-nav-btn" onclick="changeMonth(-1)">‹</button>
    <div class="month-title" id="monthTitle"></div>
    <button class="month-nav-btn" onclick="changeMonth(1)">›</button>
  </div>
  <div id="monthStats"></div>
  <div class="section-label">Calendrier</div>
  <div class="card">
    <div class="cal-grid" id="calendarGrid"></div>
  </div>
  <div id="monthDetailStats"></div>
</div>

<!-- ═══════════════════════ VUE ANNÉE ═════════════════ -->
<div class="view" id="view-annee">
  <div id="yearStats"></div>
</div>

<div class="toast" id="toast"></div>

<!-- ═══════════════════════ SCRIPT ════════════════════ -->
<script>
// ─── CONFIG ───────────────────────────────────────────
const CONFIG = {
  prayers: [
    { id:'fajr',    name:'Fajr',    rawatib:true,  rawatibCount:2 },
    { id:'dhuhr',   name:'Dhuhr',   rawatib:true,  rawatibCount:4 },
    { id:'asr',     name:'Asr',     rawatib:false, rawatibCount:0 },
    { id:'maghrib', name:'Maghrib', rawatib:true,  rawatibCount:2 },
    { id:'isha',    name:'Isha',    rawatib:true,  rawatibCount:2 },
  ],
  habits: [
    { id:'quran',      name:'Coran',                  type:'counter', unit:'pages', max:30 },
    { id:'adhkar_am',  name:'Adhkar Matin',            type:'toggle' },
    { id:'adhkar_pm',  name:'Adhkar Soir',             type:'toggle' },
    { id:'dhikr',      name:'Dhikr',                   type:'toggle' },
    { id:'douha',      name:'Douha',                   type:'toggle' },
    { id:'qiyam',      name:'Qiyam al-Layl',           type:'toggle' },
    { id:'istighfar',  name:'Istighfar',               type:'toggle' },
    { id:'salat_nabi', name:'Ṣalât sur le Prophète',  type:'toggle' },
    { id:'lecture',    name:'Lecture religieuse',      type:'toggle' },
    { id:'cours',      name:'Écoute cours / rappel',   type:'toggle' },
    { id:'sadaqa',     name:'Ṣadaqa',                 type:'toggle' },
    { id:'jeune',      name:'Jeûne surérogatoire',     type:'toggle' },
  ],
  points: {
    prayer_mosque:8, prayer_home:5, prayer_late:2, prayer_none:0,
    rawatib:1, quran_per_page:0.5,
    adhkar_am:3, adhkar_pm:3, dhikr:2, douha:3, qiyam:5,
    istighfar:2, salat_nabi:2, lecture:2, cours:2, sadaqa:3, jeune:5,
    max_possible:100,
  },
  levels: [
    { min:0,  max:29, label:'À améliorer 🌱', cls:'level-0' },
    { min:30, max:49, label:'Continue 🌷',    cls:'level-1' },
    { min:50, max:74, label:'Bien joué 🌺',   cls:'level-2' },
    { min:75, max:100,label:'Excellente 🌸',  cls:'level-3' },
  ],
  months_fr:['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'],
  days_fr:['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'],
};

// ─── STATE ────────────────────────────────────────────
let currentYear  = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let activeView   = 'jour';
let data         = {};

// ─── STORAGE ──────────────────────────────────────────
const getKey = y => `zoe_deen_${y}`;
const loadYear = y => { try { return JSON.parse(localStorage.getItem(getKey(y))||'{}'); } catch(e){return{};} };
const saveYear = (y,d) => localStorage.setItem(getKey(y), JSON.stringify(d));
const loadAllData = () => { data = loadYear(currentYear); };
const saveAllData = () => saveYear(currentYear, data);

// ─── DATE UTILS ───────────────────────────────────────
const todayStr   = () => new Date().toISOString().slice(0,10);
const dateStr    = (y,m,d) => `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const parseDate  = s => { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); };
const daysInMonth= (y,m) => new Date(y,m+1,0).getDate();
const getDayKey  = d => d.toISOString().slice(0,10);

function weekNum(ds) {
  const d=parseDate(ds), start=new Date(d.getFullYear(),0,1);
  return Math.ceil(((d-start)/86400000+start.getDay())/7);
}
function getWeekDates(year,week) {
  const jan1=new Date(year,0,1);
  const dw=jan1.getDay()||7;
  const firstMon=new Date(jan1); firstMon.setDate(jan1.getDate()-(dw-1));
  const start=new Date(firstMon); start.setDate(firstMon.getDate()+(week-1)*7);
  const end=new Date(start); end.setDate(start.getDate()+6);
  return {start,end};
}
const weeksInYear = year => weekNum(getDayKey(new Date(year,11,31)));
const formatShortDate = d => `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}`;

// ─── NAV ──────────────────────────────────────────────
function changeYear(delta) {
  currentYear += delta;
  document.getElementById('yearDisplay').textContent = currentYear;
  loadAllData(); renderCurrentView();
}

function showView(v, ev) {
  activeView = v;
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  if(ev?.target) ev.target.classList.add('active');
  renderCurrentView();
}

function renderCurrentView() {
  if(activeView==='jour') loadDay();
  else if(activeView==='semaine') renderWeekList();
  else if(activeView==='mois') renderMonth();
  else if(activeView==='annee') renderYear();
}

// ─── DAY ──────────────────────────────────────────────
function buildDayTemplate() {
  const t={prayers:{},habits:{},notes:''};
  CONFIG.prayers.forEach(p=>{t.prayers[p.id]={status:'none',rawatib:false};});
  CONFIG.habits.forEach(h=>{t.habits[h.id]=h.type==='counter'?0:false;});
  return t;
}

function goToday() {
  document.getElementById('dayDateInput').value=todayStr(); loadDay();
}

function loadDay() {
  const inp=document.getElementById('dayDateInput');
  const d=inp.value||todayStr(); if(!inp.value) inp.value=d;
  const [y]=d.split('-').map(Number);
  if(y!==currentYear){currentYear=y;document.getElementById('yearDisplay').textContent=currentYear;loadAllData();}
  const dd=data[d]||buildDayTemplate();
  renderPrayerGrid(dd); renderHabitsGrid(dd);
  document.getElementById('dayNotes').value=dd.notes||'';
  updateDayScore(dd);
}

function renderPrayerGrid(dayData) {
  const grid=document.getElementById('prayerGrid'); grid.innerHTML='';
  CONFIG.prayers.forEach(p=>{
    const ps=dayData.prayers[p.id]||{status:'none',rawatib:false};
    const row=document.createElement('div'); row.className='prayer-row';
    const labels={mosque:'🕌 Mosquée',home:'🏠 Maison',late:'⏱ Retard',none:'✗ Manqué'};
    const btns=['mosque','home','late','none'].map(s=>`
      <button class="prayer-btn ${ps.status===s?'selected-'+s:''}" data-prayer="${p.id}" data-status="${s}">${labels[s]}</button>
    `).join('');
    row.innerHTML=`
      <div class="prayer-name">${p.name}</div>
      <div class="prayer-options">${btns}</div>
      ${p.rawatib?`
      <div class="rawatib-row">
        <div class="rawatib-label">Rawatib · ${p.rawatibCount} rak'at</div>
        <button class="toggle-btn ${ps.rawatib?'on':''}" data-rawatib="${p.id}"></button>
      </div>`:''}
    `;
    grid.appendChild(row);
  });
  grid.querySelectorAll('[data-prayer]').forEach(b=>b.addEventListener('click',function(){setPrayer(this.dataset.prayer,this.dataset.status,this);}));
  grid.querySelectorAll('[data-rawatib]').forEach(b=>b.addEventListener('click',function(){toggleRawatib(this.dataset.rawatib,this);}));
}

function renderHabitsGrid(dayData) {
  const grid=document.getElementById('habitsGrid'); grid.innerHTML='';
  CONFIG.habits.forEach(h=>{
    const val=dayData.habits[h.id];
    const row=document.createElement('div'); row.className='habit-row';
    if(h.type==='counter'){
      row.innerHTML=`
        <div class="habit-left">
          <div class="habit-name">${h.name}</div>
          <div class="habit-sub">objectif ~${h.max} ${h.unit}</div>
        </div>
        <div class="counter-row">
          <button class="counter-btn" data-counter="${h.id}" data-delta="-1">−</button>
          <div class="counter-val" id="cnt-${h.id}">${val||0}</div>
          <button class="counter-btn" data-counter="${h.id}" data-delta="1">+</button>
        </div>`;
    } else {
      row.innerHTML=`
        <div class="habit-name">${h.name}</div>
        <button class="toggle-btn ${val?'on':''}" data-toggle="${h.id}"></button>`;
    }
    grid.appendChild(row);
  });
  grid.querySelectorAll('[data-counter]').forEach(b=>b.addEventListener('click',function(){adjustCounter(this.dataset.counter,parseInt(this.dataset.delta));}));
  grid.querySelectorAll('[data-toggle]').forEach(b=>b.addEventListener('click',function(){toggleHabit(this.dataset.toggle,this);}));
}

function setPrayer(prayerId,status,btn) {
  const d=document.getElementById('dayDateInput').value;
  if(!data[d]) data[d]=buildDayTemplate();
  data[d].prayers[prayerId].status=status;
  btn.closest('.prayer-options').querySelectorAll('.prayer-btn').forEach(b=>{
    b.className='prayer-btn'+(b.dataset.status===status?' selected-'+status:'');
  });
  updateDayScore(data[d]); autoSave();
}

function toggleRawatib(prayerId,btn) {
  const d=document.getElementById('dayDateInput').value;
  if(!data[d]) data[d]=buildDayTemplate();
  data[d].prayers[prayerId].rawatib=!data[d].prayers[prayerId].rawatib;
  btn.classList.toggle('on'); updateDayScore(data[d]); autoSave();
}

function toggleHabit(habitId,btn) {
  const d=document.getElementById('dayDateInput').value;
  if(!data[d]) data[d]=buildDayTemplate();
  data[d].habits[habitId]=!data[d].habits[habitId];
  btn.classList.toggle('on'); updateDayScore(data[d]); autoSave();
}

function adjustCounter(habitId,delta) {
  const d=document.getElementById('dayDateInput').value;
  if(!data[d]) data[d]=buildDayTemplate();
  const nv=Math.max(0,(data[d].habits[habitId]||0)+delta);
  data[d].habits[habitId]=nv;
  document.getElementById('cnt-'+habitId).textContent=nv;
  updateDayScore(data[d]); autoSave();
}

function autoSave() {
  const d=document.getElementById('dayDateInput').value;
  if(!data[d]) return;
  data[d].notes=document.getElementById('dayNotes').value;
  saveAllData();
}

function saveDay() {
  const d=document.getElementById('dayDateInput').value;
  if(!data[d]) data[d]=buildDayTemplate();
  data[d].notes=document.getElementById('dayNotes').value;
  saveAllData(); showToast('Journée enregistrée 🌸');
}

function calcScore(dayData) {
  if(!dayData) return 0;
  let s=0; const P=CONFIG.points;
  CONFIG.prayers.forEach(p=>{
    const ps=dayData.prayers?.[p.id]||{};
    if(ps.status==='mosque') s+=P.prayer_mosque;
    else if(ps.status==='home') s+=P.prayer_home;
    else if(ps.status==='late') s+=P.prayer_late;
    if(ps.rawatib) s+=P.rawatib;
  });
  CONFIG.habits.forEach(h=>{
    const val=dayData.habits?.[h.id];
    if(h.type==='counter'){if(h.id==='quran') s+=(val||0)*P.quran_per_page;}
    else{if(val) s+=P[h.id]||2;}
  });
  return Math.min(Math.round(s),P.max_possible);
}

function getLevel(score){return CONFIG.levels.find(l=>score>=l.min&&score<=l.max)||CONFIG.levels[0];}

function updateDayScore(dayData){
  const score=calcScore(dayData), lvl=getLevel(score);
  document.getElementById('dayScore').innerHTML=`${score}<span class="score-max">/100</span>`;
  const lel=document.getElementById('dayLevel');
  lel.textContent=lvl.label; lel.className='score-level '+lvl.cls;
  document.getElementById('dayProgressBar').style.width=score+'%';
  const done=Object.values(dayData.prayers||{}).filter(p=>p.status&&p.status!=='none').length;
  document.getElementById('miniPrayers').textContent=`${done}/5`;
  document.getElementById('miniQuran').textContent=dayData.habits?.quran||0;
  document.getElementById('miniHabits').textContent=CONFIG.habits.filter(h=>h.type!=='counter'&&dayData.habits?.[h.id]).length;
}

// ─── WEEK ─────────────────────────────────────────────
function renderWeekList(){
  document.getElementById('weekYearLabel').textContent=currentYear;
  document.getElementById('weekListView').style.display='';
  document.getElementById('weekDetailView').style.display='none';
  const total=weeksInYear(currentYear), list=document.getElementById('weekList');
  list.innerHTML='';
  const cwn=weekNum(todayStr()), today=new Date();

  for(let w=1;w<=total;w++){
    const {start,end}=getWeekDates(currentYear,w);
    const wd=getWeekData(currentYear,w,start,end);
    const isCurrent=w===cwn&&currentYear===today.getFullYear();
    const dots=Array.from({length:7},(_,i)=>{
      const dc=new Date(start); dc.setDate(start.getDate()+i);
      const score=data[getDayKey(dc)]?calcScore(data[getDayKey(dc)]):-1;
      let cls='week-dot';
      if(score>=75)cls+=' filled'; else if(score>=30)cls+=' partial';
      return `<div class="${cls}"></div>`;
    }).join('');

    const card=document.createElement('div'); card.className='week-card';
    card.innerHTML=`
      <div class="week-card-header">
        <div>
          <div class="week-num">Semaine ${w}${isCurrent?' <span style="font-size:11px;color:var(--rose2)">●</span>':''}</div>
          <div class="week-dates">${formatShortDate(start)} → ${formatShortDate(end)}</div>
        </div>
        <div class="week-score-badge">${wd.avgScore}%</div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div class="week-dots">${dots}</div>
        <div style="font-size:11px;color:var(--text3)">${wd.filledDays}/7 jours</div>
      </div>`;
    card.addEventListener('click',()=>showWeekDetail(w));
    list.appendChild(card);
  }
}

function getWeekData(year,weekN,start,end){
  let totalScore=0,filledDays=0,bestScore=0,cs=0,maxStreak=0;
  const stats={};
  CONFIG.prayers.forEach(p=>['mosque','home','late','none','raw'].forEach(s=>stats['p_'+p.id+'_'+s]=0));
  CONFIG.habits.forEach(h=>stats['h_'+h.id]=0);

  for(let i=0;i<7;i++){
    const dc=new Date(start); dc.setDate(start.getDate()+i);
    const dk=getDayKey(dc), day=data[dk];
    if(!day){cs=0;continue;}
    const s=calcScore(day);
    totalScore+=s; filledDays++;
    if(s>bestScore)bestScore=s;
    cs++; if(cs>maxStreak)maxStreak=cs;
    CONFIG.prayers.forEach(p=>{
      const ps=day.prayers?.[p.id]||{};
      if(ps.status) stats['p_'+p.id+'_'+ps.status]++;
      if(ps.rawatib) stats['p_'+p.id+'_raw']++;
    });
    CONFIG.habits.forEach(h=>{
      const val=day.habits?.[h.id];
      stats['h_'+h.id]+=h.type==='counter'?(val||0):(val?1:0);
    });
  }
  stats.streak=maxStreak;
  return {avgScore:filledDays?Math.round(totalScore/filledDays):0,filledDays,bestScore,stats};
}

function showWeekDetail(weekN){
  document.getElementById('weekListView').style.display='none';
  document.getElementById('weekDetailView').style.display='';
  const {start,end}=getWeekDates(currentYear,weekN);
  const wd=getWeekData(currentYear,weekN,start,end); const s=wd.stats;

  let html=`
    <div class="section-label">Semaine ${weekN} · ${formatShortDate(start)} → ${formatShortDate(end)}</div>
    <div class="stat-grid-2">
      <div class="stat-box highlight"><div class="stat-box-num">${wd.avgScore}</div><div class="stat-box-label">Score Moyen</div></div>
      <div class="stat-box"><div class="stat-box-num">${wd.filledDays}/7</div><div class="stat-box-label">Jours remplis</div></div>
      <div class="stat-box"><div class="stat-box-num">${wd.bestScore}</div><div class="stat-box-label">Meilleur Jour</div></div>
      <div class="stat-box"><div class="stat-box-num">${s.streak}</div><div class="stat-box-label">Meilleure Série</div></div>
    </div>
    <div class="card"><div class="section-label">Prières</div>
  `;

  CONFIG.prayers.forEach(p=>{
    const mosque=s['p_'+p.id+'_mosque'],home=s['p_'+p.id+'_home'],
          late=s['p_'+p.id+'_late'],raw=s['p_'+p.id+'_raw'];
    const tot=mosque+home+late+(s['p_'+p.id+'_none']||0);
    const pct=tot?Math.round((mosque+home)/tot*100):0;
    html+=`
      <div style="margin-bottom:16px">
        <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;font-weight:600;color:var(--text);margin-bottom:7px">${p.name}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:7px">
          <span class="chip chip-green">🕌 ${mosque}×</span>
          <span class="chip chip-rose">🏠 ${home}×</span>
          <span class="chip chip-amber">⏱ ${late}×</span>
          ${p.rawatib?`<span class="chip chip-lilac">✦ Raw. ${raw}×</span>`:''}
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
      </div>`;
  });

  html+=`</div><div class="card"><div class="section-label">Habitudes</div>`;
  CONFIG.habits.forEach(h=>{
    const val=s['h_'+h.id];
    const max=h.type==='counter'?7*(h.max||30):7;
    const pct=Math.min(100,Math.round(val/max*100));
    html+=`
      <div class="bar-row">
        <div class="bar-label-row">
          <span class="bar-label">${h.name}</span>
          <span class="bar-num">${val}${h.type==='counter'?' '+h.unit:'/7'}</span>
        </div>
        <div class="bar-track"><div class="bar-fill green" style="width:${pct}%"></div></div>
      </div>`;
  });
  html+=`</div>`;
  document.getElementById('weekDetailContent').innerHTML=html;
}

function showWeekList(){
  document.getElementById('weekListView').style.display='';
  document.getElementById('weekDetailView').style.display='none';
}

// ─── MONTH ────────────────────────────────────────────
function renderMonth(){
  document.getElementById('monthTitle').textContent=CONFIG.months_fr[currentMonth]+' '+currentYear;
  const ms=getMonthStats(currentYear,currentMonth);

  document.getElementById('monthStats').innerHTML=`
    <div class="stat-grid-2">
      <div class="stat-box highlight"><div class="stat-box-num">${ms.avgScore}</div><div class="stat-box-label">Score Moyen</div></div>
      <div class="stat-box"><div class="stat-box-num">${ms.filledDays}/${ms.totalDays}</div><div class="stat-box-label">Jours Trackés</div></div>
      <div class="stat-box"><div class="stat-box-num">${ms.bestScore}</div><div class="stat-box-label">Meilleur Score</div></div>
      <div class="stat-box"><div class="stat-box-num">${ms.streak}</div><div class="stat-box-label">Meilleure Série</div></div>
    </div>`;

  renderCalendar(currentYear,currentMonth);

  let dhtml=`<div class="section-label" style="margin-top:14px">Récapitulatif du Mois</div><div class="card"><div class="section-label">Prières</div>`;
  CONFIG.prayers.forEach(p=>{
    const mosque=ms.stats['p_'+p.id+'_mosque'],home=ms.stats['p_'+p.id+'_home'],
          late=ms.stats['p_'+p.id+'_late'],raw=ms.stats['p_'+p.id+'_raw'];
    dhtml+=`
      <div style="margin-bottom:12px">
        <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;font-weight:600;color:var(--text);margin-bottom:5px">${p.name}</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          <span class="chip chip-green">🕌 ${mosque}×</span>
          <span class="chip chip-rose">🏠 ${home}×</span>
          <span class="chip chip-amber">⏱ ${late}×</span>
          ${p.rawatib?`<span class="chip chip-lilac">Raw. ${raw}×</span>`:''}
        </div>
      </div>`;
  });
  dhtml+=`<hr class="divider"><div class="section-label">Habitudes</div>`;
  CONFIG.habits.forEach(h=>{
    dhtml+=`<div class="detail-row"><span class="detail-label">${h.name}</span><span class="detail-val">${ms.stats['h_'+h.id]}${h.type==='counter'?' '+h.unit:'×'}</span></div>`;
  });
  dhtml+=`</div>`;
  document.getElementById('monthDetailStats').innerHTML=dhtml;
}

function getMonthStats(year,month){
  const total=daysInMonth(year,month);
  let avgScore=0,filledDays=0,bestScore=0,streak=0,cs=0;
  const stats={};
  CONFIG.prayers.forEach(p=>['mosque','home','late','none','raw'].forEach(s=>stats['p_'+p.id+'_'+s]=0));
  CONFIG.habits.forEach(h=>stats['h_'+h.id]=0);

  for(let d=1;d<=total;d++){
    const dk=dateStr(year,month,d), day=data[dk];
    if(!day){cs=0;continue;}
    const s=calcScore(day);
    avgScore+=s; filledDays++;
    if(s>bestScore)bestScore=s;
    cs++; if(cs>streak)streak=cs;
    CONFIG.prayers.forEach(p=>{
      const ps=day.prayers?.[p.id]||{};
      if(ps.status) stats['p_'+p.id+'_'+ps.status]++;
      if(ps.rawatib) stats['p_'+p.id+'_raw']++;
    });
    CONFIG.habits.forEach(h=>{
      const val=day.habits?.[h.id];
      stats['h_'+h.id]+=h.type==='counter'?(val||0):(val?1:0);
    });
  }
  return {avgScore:filledDays?Math.round(avgScore/filledDays):0,filledDays,totalDays:total,bestScore,streak,stats};
}

function renderCalendar(year,month){
  const grid=document.getElementById('calendarGrid'); grid.innerHTML='';
  CONFIG.days_fr.forEach(d=>{const h=document.createElement('div');h.className='cal-header';h.textContent=d;grid.appendChild(h);});
  const first=new Date(year,month,1);
  let sd=first.getDay()-1; if(sd<0)sd=6;
  for(let i=0;i<sd;i++){const e=document.createElement('div');e.className='cal-day empty';grid.appendChild(e);}
  const total=daysInMonth(year,month), today=todayStr();
  for(let d=1;d<=total;d++){
    const dk=dateStr(year,month,d), day=data[dk];
    const score=day?calcScore(day):-1;
    let cc='score-color-0',st='';
    if(score>=0){st=score;if(score<30)cc='score-color-1';else if(score<50)cc='score-color-2';else if(score<75)cc='score-color-3';else cc='score-color-4';}
    const cell=document.createElement('div');
    cell.className='cal-day'+(dk===today?' today':'');
    cell.innerHTML=`<div class="cal-day-num">${d}</div>${score>=0?`<div class="cal-day-score ${cc}">${st}</div>`:''}`;
    cell.addEventListener('click',()=>openDayFromCalendar(dk));
    grid.appendChild(cell);
  }
}

function openDayFromCalendar(dk){
  const [y,m]=dk.split('-').map(Number);
  currentYear=y; currentMonth=m-1;
  document.getElementById('yearDisplay').textContent=currentYear;
  loadAllData();
  document.getElementById('dayDateInput').value=dk;
  activeView='jour';
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-jour').classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t=>{if(t.getAttribute('onclick')?.includes("'jour'"))t.classList.add('active');});
  loadDay();
}

function changeMonth(delta){
  currentMonth+=delta;
  if(currentMonth<0){currentMonth=11;currentYear--;loadAllData();}
  if(currentMonth>11){currentMonth=0;currentYear++;loadAllData();}
  document.getElementById('yearDisplay').textContent=currentYear;
  renderMonth();
}

// ─── YEAR ─────────────────────────────────────────────
function renderYear(){
  const ys=getYearStats(currentYear);
  let html=`
    <div class="section-label">${currentYear} — Bilan Annuel</div>
    <div class="stat-grid-2">
      <div class="stat-box highlight"><div class="stat-box-num">${ys.avgScore}</div><div class="stat-box-label">Score Moyen</div></div>
      <div class="stat-box"><div class="stat-box-num">${ys.filledDays}/365</div><div class="stat-box-label">Jours Trackés</div></div>
      <div class="stat-box"><div class="stat-box-num">${ys.bestStreak}</div><div class="stat-box-label">Meilleure Série</div></div>
      <div class="stat-box"><div class="stat-box-num">${ys.excellentDays}</div><div class="stat-box-label">Jours Excellents</div></div>
    </div>

    <div class="section-label">Heatmap Annuelle</div>
    <div class="card">
      <div class="heatmap-wrap"><div class="heatmap-grid" id="heatmapGrid"></div></div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:10px;justify-content:flex-end">
        <span style="font-size:10px;color:var(--text3)">Moins</span>
        ${[0,1,2,3,4].map(i=>`<div class="heatmap-cell h${i}" style="width:12px;height:12px;border-radius:2px;flex-shrink:0"></div>`).join('')}
        <span style="font-size:10px;color:var(--text3)">Plus</span>
      </div>
    </div>

    <div class="section-label">Score par Mois</div>
    <div class="card">
      <div class="month-bars" id="monthBars"></div>
      <div style="display:flex;gap:0;margin-top:5px">
        ${CONFIG.months_fr.map(m=>`<div style="flex:1;text-align:center;font-size:7px;color:var(--text3);font-weight:600">${m.slice(0,3)}</div>`).join('')}
      </div>
    </div>

    <div class="card"><div class="section-label">Prières — Total Annuel</div>
  `;

  CONFIG.prayers.forEach(p=>{
    const mosque=ys.stats['p_'+p.id+'_mosque'],home=ys.stats['p_'+p.id+'_home'],
          late=ys.stats['p_'+p.id+'_late'],raw=ys.stats['p_'+p.id+'_raw'];
    html+=`
      <div style="margin-bottom:12px">
        <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;font-weight:600;color:var(--text);margin-bottom:5px">${p.name}</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          <span class="chip chip-green">🕌 ${mosque}×</span>
          <span class="chip chip-rose">🏠 ${home}×</span>
          <span class="chip chip-amber">⏱ ${late}×</span>
          ${p.rawatib?`<span class="chip chip-lilac">Raw. ${raw}×</span>`:''}
        </div>
      </div>`;
  });

  html+=`<hr class="divider"><div class="section-label">Habitudes — Total Annuel</div>`;
  CONFIG.habits.forEach(h=>{
    html+=`<div class="detail-row"><span class="detail-label">${h.name}</span><span class="detail-val">${ys.stats['h_'+h.id]}${h.type==='counter'?' '+h.unit:'×'}</span></div>`;
  });
  html+=`</div>`;

  html+=`
    <div class="section-label">Options</div>
    <div class="flex-row">
      <button class="btn-sm" onclick="exportData()">📤 Exporter JSON</button>
      <button class="btn-sm" onclick="importData()">📥 Importer JSON</button>
      <button class="btn-sm btn-danger" onclick="resetYear()">Réinitialiser ${currentYear}</button>
    </div>`;

  document.getElementById('yearStats').innerHTML=html;
  renderHeatmap(currentYear);
  renderMonthBars(currentYear,ys.monthScores);

function getYearStats(year){
  let avgScore=0,filledDays=0,bestStreak=0,cs=0,excellentDays=0;
  const stats={};
  CONFIG.prayers.forEach(p=>['mosque','home','late','none','raw'].forEach(s=>stats['p_'+p.id+'_'+s]=0));
  CONFIG.habits.forEach(h=>stats['h_'+h.id]=0);
  const monthScores=Array(12).fill(0),monthFilled=Array(12).fill(0);

  for(let m=0;m<12;m++){
    for(let d=1;d<=daysInMonth(year,m);d++){
      const dk=dateStr(year,m,d),day=data[dk];
      if(!day){cs=0;continue;}
      const s=calcScore(day);
      avgScore+=s; filledDays++;
      monthScores[m]+=s; monthFilled[m]++;
      if(s>=75)excellentDays++;
      cs++; if(cs>bestStreak)bestStreak=cs;
      CONFIG.prayers.forEach(p=>{
        const ps=day.prayers?.[p.id]||{};
        if(ps.status) stats['p_'+p.id+'_'+ps.status]++;
        if(ps.rawatib) stats['p_'+p.id+'_raw']++;
      });
      CONFIG.habits.forEach(h=>{
        const val=day.habits?.[h.id];
        stats['h_'+h.id]+=h.type==='counter'?(val||0):(val?1:0);
      });
    }
  }
  const monthAvgs=monthScores.map((s,i)=>monthFilled[i]?Math.round(s/monthFilled[i]):0);
  return {avgScore:filledDays?Math.round(avgScore/filledDays):0,filledDays,bestStreak,excellentDays,stats,monthScores:monthAvgs};
}

function renderHeatmap(year){
  const grid=document.getElementById('heatmapGrid'); if(!grid)return;
  grid.innerHTML='';
  const jan1=new Date(year,0,1); let dw=jan1.getDay()-1; if(dw<0)dw=6;
  for(let i=0;i<dw;i++){const e=document.createElement('div');grid.appendChild(e);}
  for(let m=0;m<12;m++){
    for(let d=1;d<=daysInMonth(year,m);d++){
      const dk=dateStr(year,m,d),day=data[dk],score=day?calcScore(day):-1;
      let lvl=0;
      if(score>=75)lvl=4;else if(score>=50)lvl=3;else if(score>=30)lvl=2;else if(score>=0)lvl=1;
      const cell=document.createElement('div');
      cell.className=`heatmap-cell h${score<0?0:lvl}`;
      cell.title=`${dk} : ${score>=0?score+'/100':'Non rempli'}`;
      cell.addEventListener('click',()=>openDayFromCalendar(dk));
      grid.appendChild(cell);
    }
  }
}

function renderMonthBars(year,monthAvgs){
  const bars=document.getElementById('monthBars'); if(!bars)return;
  bars.innerHTML='';
  const maxVal=Math.max(...monthAvgs,1);
  monthAvgs.forEach(avg=>{
    const col=document.createElement('div'); col.className='month-bar-col';
    const pct=Math.round(avg/maxVal*100);
    col.innerHTML=`<div class="month-bar" style="height:${pct}%;opacity:${avg?1:0.15}"></div>`;
    bars.appendChild(col);
  });
}

// ─── TOAST ────────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ─── IMPORT / EXPORT / RESET ──────────────────────────
function exportData(){
  const all={};
  for(let y=2024;y<=2050;y++){const d=loadYear(y);if(Object.keys(d).length)all[y]=d;}
  const blob=new Blob([JSON.stringify(all,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`zoe-deen-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); showToast('Export réussi 🌸');
}

function importData(){
  const input=document.createElement('input'); input.type='file'; input.accept='.json';
  input.onchange=e=>{
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const all=JSON.parse(ev.target.result);
        Object.entries(all).forEach(([y,d])=>saveYear(parseInt(y),d));
        loadAllData(); renderCurrentView(); showToast('Import réussi 🌸');
      }catch(err){showToast('Erreur import JSON');}
    };
    r.readAsText(e.target.files[0]);
  };
  input.click();
}

function resetYear(){
  if(!confirm(`Réinitialiser toutes les données de ${currentYear} ?`))return;
  data={}; saveAllData(); renderCurrentView();
  showToast(`Année ${currentYear} réinitialisée`);
}

// ─── INIT ─────────────────────────────────────────────
function init(){
  const today=new Date();
  currentYear=today.getFullYear(); currentMonth=today.getMonth();
  document.getElementById('yearDisplay').textContent=currentYear;
  document.getElementById('dayDateInput').value=todayStr();
  loadAllData(); loadDay();
}

init();
</script>
